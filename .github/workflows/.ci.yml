name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u gavishka-sahan --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/gavishka-sahan/todo-api:latest .
          docker push ghcr.io/gavishka-sahan/todo-api:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u gavishka-sahan --password-stdin
            docker pull ghcr.io/gavishka-sahan/todo-api:latest
            docker stop todo-api || true
            docker rm todo-api || true
            docker run -d --name todo-api -p 8000:8000 ghcr.io/gavishka-sahan/todo-api:latest
